<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <clipPath id="slideClipC">
      <rect x="0" y="0" width="1920" height="1080"/>
    </clipPath>
  </defs>
  <g clip-path="url(#slideClipC)">
    <!-- White body -->
    <rect x="0" y="0" width="1920" height="1080" fill="#FFFFFF"/>
    
    <!-- Header band - architectural zone -->
    <rect x="0" y="0" width="1920" height="130" fill="#1B3A5C"/>
    
    <!-- Lighter header sub-band -->
    <rect x="0" y="130" width="1920" height="6" fill="#4DA8DA"/>
    
    <!-- Section tag in header -->
    <text x="80" y="45" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#4DA8DA" letter-spacing="3">SECTION 2 · COMPUTATIONAL WORKFLOW</text>
    
    <!-- Slide title -->
    <text x="80" y="100" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">Feature Engineering: Molecular Descriptor Selection</text>
    
    <!-- Right metadata block in header -->
    <rect x="1580" y="20" width="260" height="90" fill="#142D4A"/>
    <text x="1600" y="48" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" fill="#4DA8DA" letter-spacing="2">PROJECT STATUS</text>
    <rect x="1600" y="56" width="220" height="1" fill="#2A5070"/>
    <text x="1600" y="74" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#8CB8D8">Implementation: Complete</text>
    <text x="1600" y="94" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#8CB8D8">Validation: In Progress</text>
    
    <!-- Content zone - starts below header -->
    
    <!-- Left column: text content -->
    <text x="80" y="200" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#1B3A5C" letter-spacing="2">APPROACH</text>
    <rect x="80" y="212" width="40" height="3" fill="#4DA8DA"/>
    
    <text x="80" y="250" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#333333" letter-spacing="0.3">Molecular descriptors were selected based on three criteria:</text>
    <text x="80" y="278" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#333333">chemical interpretability, computational cost, and predictive</text>
    <text x="80" y="306" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#333333">relevance for target properties.</text>
    
    <!-- Descriptor cards -->
    <rect x="80" y="350" width="530" height="140" fill="#F4F7FA" stroke="#E0E8F0" stroke-width="1"/>
    <rect x="80" y="350" width="6" height="140" fill="#1B3A5C"/>
    <text x="110" y="385" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1B3A5C">2D Topological Descriptors</text>
    <text x="110" y="415" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#555555">Morgan fingerprints (r=2, 2048-bit), MACCS keys,</text>
    <text x="110" y="440" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#555555">topological polar surface area, rotatable bonds</text>
    <text x="110" y="475" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#4DA8DA">COMPUTE TIME: &lt;0.01s PER MOLECULE</text>
    
    <rect x="80" y="510" width="530" height="140" fill="#F4F7FA" stroke="#E0E8F0" stroke-width="1"/>
    <rect x="80" y="510" width="6" height="140" fill="#24547A"/>
    <text x="110" y="545" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1B3A5C">3D Electronic Descriptors</text>
    <text x="110" y="575" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#555555">HOMO/LUMO energies, partial charges (Mulliken),</text>
    <text x="110" y="600" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#555555">dipole moment, electrostatic potential surfaces</text>
    <text x="110" y="635" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#E8833A">COMPUTE TIME: ~45min PER MOLECULE (DFT)</text>
    
    <rect x="80" y="670" width="530" height="140" fill="#F4F7FA" stroke="#E0E8F0" stroke-width="1"/>
    <rect x="80" y="670" width="6" height="140" fill="#4DA8DA"/>
    <text x="110" y="705" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1B3A5C">Graph-Based Representations</text>
    <text x="110" y="735" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#555555">Atom-level node features, bond-level edge features,</text>
    <text x="110" y="760" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#555555">3D coordinate embeddings for GNN input</text>
    <text x="110" y="795" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#4DA8DA">COMPUTE TIME: &lt;0.1s PER MOLECULE</text>
    
    <!-- Right column: figure placeholder -->
    <rect x="680" y="350" width="720" height="460" fill="#F0F3F7" stroke="#D0D8E0" stroke-width="2"/>
    <text x="1040" y="565" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#8CA0B4" text-anchor="middle">FIGURE: Feature Importance Heatmap</text>
    <text x="1040" y="595" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#A0B0C0" text-anchor="middle">Correlation matrix across 847 molecular descriptors</text>
    <!-- Placeholder grid pattern -->
    <rect x="760" y="420" width="580" height="320" fill="none" stroke="#D8E0E8" stroke-width="1"/>
    <line x1="760" y1="500" x2="1340" y2="500" stroke="#E8EDF2" stroke-width="1"/>
    <line x1="760" y1="580" x2="1340" y2="580" stroke="#E8EDF2" stroke-width="1"/>
    <line x1="760" y1="660" x2="1340" y2="660" stroke="#E8EDF2" stroke-width="1"/>
    <line x1="905" y1="420" x2="905" y2="740" stroke="#E8EDF2" stroke-width="1"/>
    <line x1="1050" y1="420" x2="1050" y2="740" stroke="#E8EDF2" stroke-width="1"/>
    <line x1="1195" y1="420" x2="1195" y2="740" stroke="#E8EDF2" stroke-width="1"/>
    <!-- Dummy heatmap blocks -->
    <rect x="760" y="420" width="145" height="80" fill="#1B3A5C" opacity="0.8"/>
    <rect x="905" y="420" width="145" height="80" fill="#1B3A5C" opacity="0.5"/>
    <rect x="1050" y="420" width="145" height="80" fill="#1B3A5C" opacity="0.3"/>
    <rect x="1195" y="420" width="145" height="80" fill="#1B3A5C" opacity="0.15"/>
    <rect x="760" y="500" width="145" height="80" fill="#1B3A5C" opacity="0.5"/>
    <rect x="905" y="500" width="145" height="80" fill="#1B3A5C" opacity="0.7"/>
    <rect x="1050" y="500" width="145" height="80" fill="#1B3A5C" opacity="0.6"/>
    <rect x="1195" y="500" width="145" height="80" fill="#1B3A5C" opacity="0.2"/>
    <rect x="760" y="580" width="145" height="80" fill="#1B3A5C" opacity="0.3"/>
    <rect x="905" y="580" width="145" height="80" fill="#1B3A5C" opacity="0.6"/>
    <rect x="1050" y="580" width="145" height="80" fill="#1B3A5C" opacity="0.9"/>
    <rect x="1195" y="580" width="145" height="80" fill="#1B3A5C" opacity="0.4"/>
    <rect x="760" y="660" width="145" height="80" fill="#1B3A5C" opacity="0.15"/>
    <rect x="905" y="660" width="145" height="80" fill="#1B3A5C" opacity="0.2"/>
    <rect x="1050" y="660" width="145" height="80" fill="#1B3A5C" opacity="0.4"/>
    <rect x="1195" y="660" width="145" height="80" fill="#1B3A5C" opacity="0.85"/>
    
    <!-- Right side: key insight callout -->
    <rect x="1440" y="350" width="400" height="180" fill="#1B3A5C"/>
    <text x="1470" y="385" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#4DA8DA" letter-spacing="2">KEY FINDING</text>
    <rect x="1470" y="395" width="100" height="2" fill="#4DA8DA"/>
    <text x="1470" y="425" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#D0DEE8">3D electronic descriptors show</text>
    <text x="1470" y="447" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#D0DEE8">highest predictive power for</text>
    <text x="1470" y="469" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#D0DEE8">reaction barrier heights</text>
    <text x="1470" y="510" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#FFFFFF">R² = 0.94</text>
    
    <rect x="1440" y="545" width="400" height="100" fill="#F4F7FA" stroke="#D0D8E0" stroke-width="1"/>
    <text x="1470" y="575" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#1B3A5C" letter-spacing="2">IMPLICATION</text>
    <text x="1470" y="605" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#555555">DFT pre-computation justified for</text>
    <text x="1470" y="625" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#555555">high-accuracy prediction targets</text>
    
    <!-- Bottom bar -->
    <rect x="0" y="1040" width="1920" height="40" fill="#1B3A5C"/>
    <text x="80" y="1066" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#6B99B8" letter-spacing="1">COMPUTATIONAL CHEMISTRY LAB · FEATURE ENGINEERING</text>
    <text x="1840" y="1066" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#6B99B8" text-anchor="end">8 / 28</text>
    
    <!-- Subtle left margin accent -->
    <rect x="0" y="136" width="4" height="904" fill="#4DA8DA" opacity="0.3"/>
  </g>
</svg>
