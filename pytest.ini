[pytest]
pythonpath = src
testpaths = tests
asyncio_mode = auto
addopts = -ra --tb=short --strict-markers
markers =
    api: HTTP API tests
    ws: WebSocket contract tests
    contract: payload/result contract tests
    e2e: end-to-end HTTP/browser-adjacent smoke tests
    slow: slow tests
    real_pyscf: real PySCF integration tests
    live: live external API smoke tests
filterwarnings =
    ignore::DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:starlette.*
    ignore::DeprecationWarning:httpx.*
