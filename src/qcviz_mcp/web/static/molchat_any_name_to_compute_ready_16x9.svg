<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="molchatGrad" x1="520" y1="210" x2="1090" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowSlate" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L11 6L1 11V1Z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L11 6L1 11V1Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L11 6L1 11V1Z" fill="#059669"/>
    </marker>
    <style>
      .eyebrow { font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 800; letter-spacing: 3px; fill: #F59E0B; }
      .title { font-family: "Segoe UI", Arial, sans-serif; font-size: 34px; font-weight: 800; fill: #0F172A; }
      .subtitle { font-family: "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #475569; }
      .section { font-family: "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #1E293B; letter-spacing: 1px; }
      .cardtitle { font-family: "Segoe UI", Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #0F172A; }
      .body { font-family: "Segoe UI", Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #475569; }
      .small { font-family: "Segoe UI", Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #64748B; }
      .tiny { font-family: "Segoe UI", Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #64748B; letter-spacing: 1px; }
      .whiteTitle { font-family: "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #FFFFFF; }
      .whiteBody { font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #E0E7FF; }
      .mono { font-family: "Consolas", "Courier New", monospace; font-size: 14px; font-weight: 700; fill: #0F172A; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bgGrad)"/>
  <rect x="24" y="24" width="1552" height="852" rx="28" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <text x="58" y="74" class="eyebrow">METHODS</text>
  <text x="58" y="124" class="title">MolChat — From Any Name to a Compute-Ready 3D Structure, Automatically</text>
  <text x="58" y="158" class="subtitle">Structure grounding is the first hard gate before any DFT or HF calculation can begin.</text>

  <g filter="url(#cardShadow)">
    <rect x="58" y="206" width="344" height="560" rx="26" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <text x="88" y="248" class="section">REAL-WORLD INPUT</text>
    <text x="88" y="278" class="body">Experimentalists rarely begin with a perfect compute-ready identifier.</text>

    <rect x="88" y="314" width="284" height="78" rx="18" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="112" y="343" class="tiny">EXACT NAME</text>
    <text x="112" y="370" class="cardtitle">acetone</text>

    <rect x="88" y="412" width="284" height="78" rx="18" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="112" y="441" class="tiny">KOREAN ALIAS</text>
    <text x="112" y="468" class="cardtitle">아세톤</text>

    <rect x="88" y="510" width="284" height="78" rx="18" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="112" y="539" class="tiny">ABBREVIATION / SHORT FORM</text>
    <text x="112" y="566" class="cardtitle">MEA / TNT / DMA</text>

    <rect x="88" y="608" width="284" height="112" rx="18" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="112" y="637" class="tiny">SEMANTIC DESCRIPTION</text>
    <text x="112" y="665" class="cardtitle">“that ketone”</text>
    <text x="112" y="692" class="body">or another descriptive phrase</text>

    <text x="88" y="744" class="small">Existing workflows usually fail here unless the user already has an exact name, a SMILES string, or a prepared file.</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="446" y="206" width="700" height="560" rx="30" fill="url(#molchatGrad)"/>
    <text x="480" y="252" class="whiteTitle">MolChat Structure Grounding Backend</text>
    <text x="480" y="280" class="whiteBody">Not a thin API wrapper, but a fallback chain that resolves, generates, and validates structure candidates.</text>

    <g>
      <rect x="484" y="330" width="250" height="92" rx="20" fill="#FFFFFF"/>
      <text x="510" y="360" class="tiny">STEP 1</text>
      <text x="510" y="389" class="cardtitle">Search structure sources</text>
      <text x="510" y="413" class="body">PubChem · ChemSpider · CSD · PDB · local sources</text>

      <rect x="810" y="330" width="286" height="92" rx="20" fill="#FFFFFF"/>
      <text x="838" y="360" class="tiny">DECISION</text>
      <text x="838" y="389" class="cardtitle">Is usable 3D already available?</text>
      <text x="838" y="413" class="body">If yes, retrieve it directly.</text>

      <line x1="734" y1="376" x2="810" y2="376" stroke="#FFFFFF" stroke-width="6" marker-end="url(#arrowSlate)"/>
    </g>

    <g>
      <rect x="484" y="472" width="250" height="92" rx="20" fill="#FFFFFF"/>
      <text x="510" y="502" class="tiny">STEP 2A</text>
      <text x="510" y="531" class="cardtitle">Retrieve 3D record</text>
      <text x="510" y="555" class="body">Use database coordinates when they already exist.</text>

      <rect x="810" y="472" width="286" height="92" rx="20" fill="#FFFFFF"/>
      <text x="838" y="502" class="tiny">STEP 2B</text>
      <text x="838" y="531" class="cardtitle">RDKit conformer generation</text>
      <text x="838" y="555" class="body">Build a candidate 3D structure when no 3D data is found.</text>

      <line x1="953" y1="422" x2="953" y2="472" stroke="#FFFFFF" stroke-width="6" marker-end="url(#arrowSlate)"/>
      <text x="872" y="455" class="tiny" fill="#E0E7FF">NO</text>
      <path d="M880 422V450H610V472" stroke="#FFFFFF" stroke-width="6" fill="none" marker-end="url(#arrowSlate)"/>
      <text x="620" y="455" class="tiny" fill="#E0E7FF">YES</text>
    </g>

    <g>
      <rect x="646" y="614" width="310" height="92" rx="20" fill="#FFFFFF"/>
      <text x="676" y="644" class="tiny">STEP 3</text>
      <text x="676" y="673" class="cardtitle">xTB optimization and validation</text>
      <text x="676" y="697" class="body">Refine the geometry and reject chemically unreasonable candidates.</text>

      <path d="M609 564V590H801V614" stroke="#FFFFFF" stroke-width="6" fill="none" marker-end="url(#arrowSlate)"/>
      <path d="M953 564V614" stroke="#FFFFFF" stroke-width="6" marker-end="url(#arrowSlate)"/>
    </g>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="1188" y="206" width="354" height="560" rx="26" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <text x="1218" y="248" class="section">SAFE HANDOFF TO COMPUTE</text>
    <text x="1218" y="278" class="body">MolChat does not just return a label. It decides whether the structure is safe to compute on.</text>

    <rect x="1218" y="322" width="294" height="110" rx="20" fill="#FFF7ED" stroke="#FDBA74" stroke-width="3"/>
    <text x="1244" y="352" class="tiny">AMBIGUITY HANDLING</text>
    <text x="1244" y="382" class="cardtitle">Candidate confirmation</text>
    <text x="1244" y="408" class="body">If the input is ambiguous, the system shows candidates and waits for user confirmation.</text>

    <rect x="1218" y="458" width="294" height="106" rx="20" fill="#ECFDF5" stroke="#34D399" stroke-width="3"/>
    <text x="1244" y="488" class="tiny">SAFETY RULE</text>
    <text x="1244" y="518" class="cardtitle">No unverified structure enters compute</text>
    <text x="1244" y="542" class="body">Calculation is blocked until the structure is grounded and validated.</text>

    <rect x="1218" y="592" width="294" height="132" rx="20" fill="#EEF2FF" stroke="#6366F1" stroke-width="3"/>
    <text x="1244" y="622" class="tiny">OUTPUT</text>
    <text x="1244" y="652" class="cardtitle">Compute-ready 3D structure</text>
    <text x="1244" y="678" class="body">Validated coordinates, molecular identity, and a safe downstream handoff to PySCF.</text>
    <text x="1244" y="704" class="mono">structure locked -> compute allowed</text>
  </g>

  <line x1="1146" y1="486" x2="1218" y2="486" stroke="#2563EB" stroke-width="7" marker-end="url(#arrowBlue)"/>
  <line x1="1146" y1="660" x2="1218" y2="660" stroke="#059669" stroke-width="7" marker-end="url(#arrowGreen)"/>

  <g filter="url(#cardShadow)">
    <rect x="446" y="786" width="1096" height="74" rx="22" fill="#FFFFFF" stroke="#D8B4FE" stroke-width="2"/>
    <text x="478" y="832" class="cardtitle">MolChat automates database lookup, 3D generation, optimization, and ambiguity control before any calculation begins.</text>
  </g>

  <g>
    <circle cx="1380" cy="122" r="10" fill="#2563EB"/>
    <circle cx="1410" cy="122" r="10" fill="#6366F1"/>
    <circle cx="1440" cy="122" r="10" fill="#059669"/>
    <text x="1464" y="128" class="small">Grounding, generation, and validation happen behind one user-facing name.</text>
  </g>
</svg>
