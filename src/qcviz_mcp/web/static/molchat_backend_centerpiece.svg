<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" fill="none">
  <defs>
    <linearGradient id="panelGrad" x1="80" y1="70" x2="1120" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2F63E0"/>
      <stop offset="1" stop-color="#2852C8"/>
    </linearGradient>
    <filter id="boxShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowWhite" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L11 6L1 11V1Z" fill="#FFFFFF"/>
    </marker>
    <style>
      .title { font-family: "Segoe UI", Arial, sans-serif; font-size: 28px; font-weight: 800; fill: #FFFFFF; }
      .subtitle { font-family: "Segoe UI", Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #E0E7FF; }
      .step { font-family: "Segoe UI", Arial, sans-serif; font-size: 14px; font-weight: 800; fill: #64748B; letter-spacing: 1.6px; }
      .boxTitle { font-family: "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #0F172A; }
      .boxBody { font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #475569; }
      .label { font-family: "Segoe UI", Arial, sans-serif; font-size: 13px; font-weight: 800; fill: #FDE68A; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1200" height="700" rx="36" fill="url(#panelGrad)"/>

  <text x="70" y="86" class="title">MolChat Structure Grounding Backend</text>
  <text x="70" y="126" class="subtitle">A fallback chain that resolves, generates, and validates structure candidates before compute.</text>

  <g filter="url(#boxShadow)">
    <rect x="74" y="188" width="380" height="126" rx="24" fill="#FFFFFF"/>
    <text x="112" y="230" class="step">STEP 1</text>
    <text x="112" y="272" class="boxTitle">Search structure sources</text>
    <text x="112" y="304" class="boxBody">PubChem, ChemSpider, CSD, PDB, and local sources</text>
  </g>

  <g filter="url(#boxShadow)">
    <rect x="560" y="188" width="566" height="126" rx="24" fill="#FFFFFF"/>
    <text x="600" y="230" class="step">DECISION</text>
    <text x="600" y="272" class="boxTitle">Is usable 3D already available?</text>
    <text x="600" y="304" class="boxBody">If yes, retrieve it directly. If not, generate a candidate geometry.</text>
  </g>

  <line x1="454" y1="251" x2="560" y2="251" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowWhite)"/>

  <g filter="url(#boxShadow)">
    <rect x="74" y="390" width="380" height="126" rx="24" fill="#FFFFFF"/>
    <text x="112" y="432" class="step">STEP 2A</text>
    <text x="112" y="474" class="boxTitle">Retrieve 3D record</text>
    <text x="112" y="506" class="boxBody">Use trusted coordinates when database-ready 3D already exists.</text>
  </g>

  <g filter="url(#boxShadow)">
    <rect x="560" y="390" width="566" height="126" rx="24" fill="#FFFFFF"/>
    <text x="600" y="432" class="step">STEP 2B</text>
    <text x="600" y="474" class="boxTitle">RDKit conformer generation</text>
    <text x="600" y="506" class="boxBody">Build a candidate 3D structure when no usable 3D record is found.</text>
  </g>

  <path d="M670 314V352H264V390" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" marker-end="url(#arrowWhite)"/>
  <text x="288" y="350" class="label">YES</text>

  <path d="M842 314V390" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" fill="none" marker-end="url(#arrowWhite)"/>
  <text x="856" y="356" class="label">NO</text>

  <g filter="url(#boxShadow)">
    <rect x="276" y="560" width="648" height="96" rx="24" fill="#FFFFFF"/>
    <text x="316" y="598" class="step">STEP 3</text>
    <text x="316" y="632" class="boxTitle">xTB optimization and validation</text>
    <text x="316" y="654" class="boxBody">Refine the geometry and reject chemically unreasonable candidates before handoff.</text>
  </g>

  <path d="M264 516V548H600V560" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" marker-end="url(#arrowWhite)"/>
  <path d="M842 516V560" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" fill="none" marker-end="url(#arrowWhite)"/>
</svg>
