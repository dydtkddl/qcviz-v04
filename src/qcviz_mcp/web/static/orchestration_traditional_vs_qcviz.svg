      <path d="M24 82L40 82L30 102Z" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="3" stroke-linejoin="round"/>
      <text x="24" y="49" class="bubble">“Show me the HOMO”</text>
    </g>

    <line x1="128" y1="240" x2="456" y2="240" stroke="#94A3B8" stroke-width="4" marker-end="url(#arrowSlate)"/>

