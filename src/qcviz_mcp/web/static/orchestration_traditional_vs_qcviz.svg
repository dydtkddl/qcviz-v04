      <rect x="0" y="0" width="54" height="76" rx="10" fill="#111827" stroke="#334155" stroke-width="2"/>
      <rect x="6" y="8" width="42" height="10" rx="4" fill="#334155"/>
      <text x="14" y="43" class="terminal">&gt; scf</text>
      <text x="14" y="60" class="terminal">run</text>
    </g>
    <text x="617" y="490" text-anchor="middle" class="small">Linux compute job</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="730" y="40" width="640" height="480" rx="24" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="2"/>
    <text x="764" y="84" class="panelTitle">QCViz</text>

    <g transform="translate(778 122)">
      <circle cx="44" cy="32" r="24" fill="#DBEAFE"/>
      <circle cx="36" cy="28" r="4.5" fill="#EAF4FF" stroke="#334155" stroke-width="2.5"/>
      <circle cx="52" cy="28" r="4.5" fill="#EAF4FF" stroke="#334155" stroke-width="2.5"/>
      <path d="M40 28H48" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M25 66H63L70 108H18L25 66Z" fill="#DBEAFE" stroke="#334155" stroke-width="3" stroke-linejoin="round"/>
      <path d="M30 78L44 100L58 78" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="44" y="136" text-anchor="middle" class="small">Experimentalist</text>
    </g>

    <g transform="translate(870 122)">
