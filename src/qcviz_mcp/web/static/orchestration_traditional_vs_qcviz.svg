      <rect x="0" y="0" width="240" height="96" rx="20" fill="#5B5FEF"/>
      <text x="120" y="54" text-anchor="middle" class="node">LLM Orchestration</text>
    </g>

    <g transform="translate(828 338)">
      <rect x="0" y="0" width="120" height="42" rx="14" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="2"/>
      <text x="60" y="26" text-anchor="middle" class="small">interpret</text>
      <text x="102" y="32" class="xmark">×</text>
    </g>
    <g transform="translate(968 338)">
      <rect x="0" y="0" width="160" height="42" rx="14" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="2"/>
      <text x="80" y="26" text-anchor="middle" class="small">identify task</text>
      <text x="140" y="32" class="xmark">×</text>
    </g>
    <g transform="translate(1148 338)">
      <rect x="0" y="0" width="136" height="42" rx="14" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="2"/>
      <text x="68" y="26" text-anchor="middle" class="small">prepare input</text>
      <text x="116" y="32" class="xmark">×</text>
    </g>

    <line x1="1050" y1="316" x2="1050" y2="366" stroke="#5B5FEF" stroke-width="4" marker-end="url(#arrowBlue)"/>

    <g transform="translate(810 408)">
      <rect x="0" y="0" width="148" height="66" rx="18" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="2.5"/>
