      <circle cx="44" cy="32" r="24" fill="#FED7AA"/>
      <circle cx="36" cy="28" r="4.5" fill="#FFF7ED" stroke="#7C2D12" stroke-width="2.5"/>
      <circle cx="52" cy="28" r="4.5" fill="#FFF7ED" stroke="#7C2D12" stroke-width="2.5"/>
      <path d="M40 28H48" stroke="#7C2D12" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M25 66H63L70 108H18L25 66Z" fill="#FED7AA" stroke="#7C2D12" stroke-width="3" stroke-linejoin="round"/>
