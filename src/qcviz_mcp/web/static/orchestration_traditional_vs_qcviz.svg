<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" fill="none">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowSlate" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L11 6L1 11V1Z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L11 6L1 11V1Z" fill="#5B5FEF"/>
    </marker>
    <style>
      .panelTitle { font-family: "Segoe UI", Arial, sans-serif; font-size: 28px; font-weight: 800; fill: #0F172A; }
      .body { font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #475569; }
      .small { font-family: "Segoe UI", Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #475569; }
      .bubble { font-family: "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #0F172A; }
      .node { font-family: "Segoe UI", Arial, sans-serif; font-size: 16px; font-weight: 800; fill: #FFFFFF; }
      .step { font-family: "Segoe UI", Arial, sans-serif; font-size: 14px; font-weight: 800; fill: #64748B; letter-spacing: 1px; }
      .terminal { font-family: "Consolas", "Courier New", monospace; font-size: 13px; font-weight: 700; fill: #E2E8F0; }
      .xmark { font-family: "Segoe UI", Arial, sans-serif; font-size: 56px; font-weight: 900; fill: #DC2626; }
    </style>
  </defs>

  <rect width="1400" height="560" fill="none"/>

  <g filter="url(#shadow)">
