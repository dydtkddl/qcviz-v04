      <rect x="0" y="0" width="148" height="66" rx="18" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="2.5"/>
      <text x="74" y="39" text-anchor="middle" class="body">Task</text>
    </g>
    <g transform="translate(1142 408)">
      <rect x="0" y="0" width="166" height="66" rx="18" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="2.5"/>
      <text x="83" y="39" text-anchor="middle" class="body">Compute request</text>
