      <path d="M24 82L40 82L30 102Z" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="3" stroke-linejoin="round"/>
      <text x="24" y="49" class="bubble">“Show me the HOMO”</text>
    </g>

    <line x1="828" y1="240" x2="930" y2="240" stroke="#A5B4FC" stroke-width="4" marker-end="url(#arrowBlue)"/>

