<svg xmlns="http://www.w3.org/2000/svg" width="980" height="320" viewBox="0 0 980 320" fill="none">
  <defs>
    <linearGradient id="bottomPanelGrad" x1="0" y1="0" x2="980" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4E79CF"/>
      <stop offset="1" stop-color="#3F68BF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font-family: "Segoe UI", Arial, sans-serif; font-size: 26px; font-weight: 800; fill: #FFFFFF; }
      .body { font-family: "Segoe UI", Arial, sans-serif; font-size: 19px; font-weight: 700; fill: #EEF3FF; }
      .small { font-family: "Segoe UI", Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #DDE7FF; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <ellipse cx="490" cy="160" rx="460" ry="130" fill="url(#bottomPanelGrad)"/>
    <text x="490" y="112" text-anchor="middle" class="title">QCViz chooses a reasonable starting setup using</text>
    <text x="490" y="162" text-anchor="middle" class="body">molecular properties · task type</text>
    <text x="490" y="204" text-anchor="middle" class="body">literature-backed recommendation rules</text>
    <text x="490" y="244" text-anchor="middle" class="small">functional · basis · grid · dispersion</text>
  </g>
</svg>
